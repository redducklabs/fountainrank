# Pre-commit baseline. Backend (ruff) and frontend (eslint/prettier) hooks
# are added in plans 0b/0c. Install: pip install pre-commit && pre-commit install
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=2048"]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff-check
        args: ["--fix"]
        files: ^backend/
      - id: ruff-format
        files: ^backend/
  - repo: local
    hooks:
      - id: prettier
        name: prettier (frontend)
        entry: pnpm run format:check
        language: system
        pass_filenames: false
        files: ^(web|mobile|packages)/.*\.(ts|tsx|js|jsx|mjs|cjs|json|css|md)$
      - id: eslint
        name: eslint (frontend)
        entry: pnpm run lint
        language: system
        pass_filenames: false
        files: ^(web|mobile|packages)/.*\.(ts|tsx|js|jsx|mjs|cjs)$
