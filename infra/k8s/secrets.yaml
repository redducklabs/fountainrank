# 📄 REFERENCE ONLY — NOT part of the kubectl apply manifest loop. Documents the key
# contract for `fountainrank-secrets`. CI creates this secret imperatively from the
# GitHub `production` environment secrets at deploy time (Phase 0f). DO NOT commit real
# values, and DO NOT `kubectl apply` this file (it would overwrite real values with empties).
apiVersion: v1
kind: Secret
metadata:
  name: fountainrank-secrets
  namespace: ${NAMESPACE}
  labels:
    app: fountainrank
type: Opaque
stringData:
  # REQUIRED in Phase 0f. Async SQLAlchemy URL to the Managed Postgres app DB
  # (postgresql+asyncpg://...). NOTE: asyncpg rejects libpq ?sslmode= — Managed-Postgres
  # SSL is applied in-app via connect_args (a BLOCKING Phase 0f pre-deploy change; see
  # infra/terraform/README.md).
  database-url: ""
  # REQUIRED in Phase 0f (logto.yaml is in the 0f apply set, so this must be present and
  # non-empty or the Logto pod crash-loops). Logto's libpq URL to its own `logto` database
  # in the same managed cluster, derived from the Terraform DB outputs — e.g.
  # postgres://<user>:<pass>@<host>:<port>/logto?sslmode=require (Managed Postgres needs SSL).
  # Logto's OIDC signing keys are generated + stored in the DB on seed, so there is no
  # separate "app secret" env var. Connectors / app registrations are Phase 2.
  logto-db-url: ""
  # REQUIRED in prod. The DO Managed-Postgres CA cert (PEM). Mounted into the backend
  # at /var/run/secrets/fountainrank/database-ca.crt; the app builds an asyncpg
  # verify-full SSLContext from it (DB_SSL_ROOT_CERT). Get it from `doctl databases
  # get <id>` / the DO console. Created imperatively in deploy.yml from the
  # `production` env secret DATABASE_CA_CERT — never committed.
  database-ca.crt: ""
  # REQUIRED for email (set empty disables sending -> the /internal/email webhook 503s).
  # The Google service-account JSON key (whole file) used for Gmail-API sending via
  # domain-wide delegation; created imperatively in deploy.yml from the production env secret.
  google-service-account-json: ""
  # Shared bearer token the Logto HTTP email connector sends to /internal/email; the backend
  # constant-time compares it. From the production env secret LOGTO_EMAIL_WEBHOOK_TOKEN.
  logto-email-webhook-token: ""
  # Logto application secret for the web app (server-side SDK auth). From the production env
  # secret LOGTO_APP_SECRET. Mounted into the web pod via secretKeyRef (key: logto-app-secret).
  logto-app-secret: ""
  # Logto cookie encryption secret for the web app session. From the production env secret
  # LOGTO_COOKIE_SECRET. Mounted into the web pod via secretKeyRef (key: logto-cookie-secret).
  logto-cookie-secret: ""
