apiVersion: apps/v1
kind: Deployment
metadata:
  name: fountainrank-backend
  namespace: ${NAMESPACE}
  labels:
    app: fountainrank-backend
    component: backend
spec:
  replicas: 1
  # The new pod is held NotReady by the /readyz schema gate (app/routers/health.py) until
  # `alembic upgrade head` finishes — the deploy runs migrations by exec-ing into this very pod
  # AFTER it is applied but BEFORE it is Ready. While a data-backfill migration runs, the
  # ReplicaSet has zero Ready pods; the default progressDeadlineSeconds (600s) then latches
  # ProgressDeadlineExceeded and fails `kubectl rollout status` even though the rollout later
  # succeeds (observed: migration 0025's one-time membership backfill). 1800s is the operational
  # ceiling we allow a migration to hold the rollout before we treat it as wedged.
  progressDeadlineSeconds: 1800
  # Recreate-in-place on a small cluster: a single 256Mi pod can't surge alongside
  # its predecessor when no node has the headroom, so the default RollingUpdate
  # deadlocks (FailedScheduling). maxSurge 0 / maxUnavailable 1 tears the old pod
  # down first. This also avoids old backend code serving against newly migrated data
  # during schema/data backfills that intentionally change public URL ownership. The
  # deploy accepts a backend outage window while migrations run, then gates on
  # `kubectl rollout status` (not `wait --for=available`).
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: fountainrank-backend
  template:
    metadata:
      labels:
        app: fountainrank-backend
        component: backend
        version: ${IMAGE_TAG}
    spec:
      imagePullSecrets:
        - name: regcred
      volumes:
        - name: db-ca
          secret:
            secretName: fountainrank-secrets
            items:
              - key: database-ca.crt
                path: database-ca.crt
      containers:
        - name: backend
          image: ${REGISTRY}/fountainrank-backend:${IMAGE_TAG}
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fountainrank-secrets
                  key: database-url
            # asyncpg verify-full TLS to DO Managed Postgres. The CA is mounted from
            # fountainrank-secrets.database-ca.crt; the backend builds the SSLContext
            # from this path (app/db.py::engine_connect_args). Required in prod.
            - name: DB_SSL_ROOT_CERT
              value: /var/run/secrets/fountainrank/database-ca.crt
            # Email (Logto HTTP email connector -> Gmail API). Secrets from fountainrank-secrets;
            # delegated user + From are non-secret, substituted from GitHub env vars at deploy.
            - name: GOOGLE_SERVICE_ACCOUNT_JSON
              valueFrom:
                secretKeyRef:
                  name: fountainrank-secrets
                  key: google-service-account-json
            - name: LOGTO_EMAIL_WEBHOOK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: fountainrank-secrets
                  key: logto-email-webhook-token
            # Logto Management API M2M app for account deletion. App id/secret are
            # secretKeyRefs; resource/base URL are optional non-secret deploy vars so
            # self-hosted Logto can use a distinct OSS API indicator and HTTP API host.
            - name: LOGTO_MANAGEMENT_APP_ID
              valueFrom:
                secretKeyRef:
                  name: fountainrank-secrets
                  key: logto-management-app-id
            - name: LOGTO_MANAGEMENT_APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: fountainrank-secrets
                  key: logto-management-app-secret
            - name: LOGTO_MANAGEMENT_RESOURCE
              value: "${LOGTO_MANAGEMENT_RESOURCE}"
            - name: LOGTO_MANAGEMENT_API_BASE_URL
              value: "${LOGTO_MANAGEMENT_API_BASE_URL}"
            # Geocoding proxy (LocationIQ) — the only secret; missing key -> 503 geocoding_disabled
            # (backend/app/config.py::geocoding_enabled). See §8.4/§15 of the mobile map UX design.
            - name: GEOCODING_API_KEY
              valueFrom:
                secretKeyRef:
                  name: fountainrank-secrets
                  key: geocoding-api-key
            # DO Spaces (fountain photos, S3-compatible object storage). All five default
            # empty in fountainrank-secrets -> Settings.photos_enabled is false and the
            # upload endpoints fail closed with 503 (backend/app/config.py). See spec §16.1
            # for the pre-deploy Spaces key scope dependency.
            - name: SPACES_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: fountainrank-secrets
                  key: spaces-endpoint
                  optional: true
            - name: SPACES_REGION
              valueFrom:
                secretKeyRef:
                  name: fountainrank-secrets
                  key: spaces-region
                  optional: true
            - name: SPACES_BUCKET
              valueFrom:
                secretKeyRef:
                  name: fountainrank-secrets
                  key: spaces-bucket
                  optional: true
            - name: SPACES_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: fountainrank-secrets
                  key: spaces-access-key
                  optional: true
            - name: SPACES_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: fountainrank-secrets
                  key: spaces-secret-key
                  optional: true
            - name: GOOGLE_DELEGATED_USER
              value: "${GOOGLE_DELEGATED_USER}"
            - name: FROM_EMAIL
              value: "${FROM_EMAIL}"
            # Logto subjects granted admin (request-time reconciliation, slice 6b-1).
            # Opaque ids, not secrets — from the ADMIN_SUBJECTS GitHub Actions variable.
            - name: ADMIN_SUBJECTS
              value: "${ADMIN_SUBJECTS}"
          volumeMounts:
            - name: db-ca
              mountPath: /var/run/secrets/fountainrank
              readOnly: true
          resources:
            requests:
              # 512Mi (up from 256Mi): the pod both serves traffic AND runs operator boundary loads
              # (osm-boundary-load execs the streaming loader + a PostGIS-heavy membership refresh in
              # this pod). At the old 512Mi *limit* the pod was OOMKilled (exit 137) mid-load even on
              # a small country (Austria, 2.3k features) once it was also serving crawl traffic to
              # the newly-indexed pages. The bumped request still schedules safely on the s-2vcpu-4gb
              # node (~1Gi of requests currently placed there); the 1.5Gi *limit* is a burst ceiling,
              # so watch node memory during large-country loads (a Job-isolated loader is the cleaner
              # long-term fix).
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "1536Mi"
              cpu: "500m"
          startupProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            # /readyz runs a PostGIS query — gates traffic on real DB connectivity.
            httpGet:
              path: /readyz
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: fountainrank-backend-service
  namespace: ${NAMESPACE}
  labels:
    app: fountainrank-backend
spec:
  selector:
    app: fountainrank-backend
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
