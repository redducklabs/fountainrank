apiVersion: apps/v1
kind: Deployment
metadata:
  name: fountainrank-backend
  namespace: ${NAMESPACE}
  labels:
    app: fountainrank-backend
    component: backend
spec:
  replicas: 1
  # Recreate-in-place on a small cluster: a single 256Mi pod can't surge alongside
  # its predecessor when no node has the headroom, so the default RollingUpdate
  # deadlocks (FailedScheduling). maxSurge 0 / maxUnavailable 1 tears the old pod
  # down first. The deploy gates on `kubectl rollout status` (not `wait --for=available`).
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: fountainrank-backend
  template:
    metadata:
      labels:
        app: fountainrank-backend
        component: backend
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: backend
          image: ${REGISTRY}/fountainrank-backend:${IMAGE_TAG}
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fountainrank-secrets
                  key: database-url
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          startupProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            # /readyz runs a PostGIS query — gates traffic on real DB connectivity.
            httpGet:
              path: /readyz
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: fountainrank-backend-service
  namespace: ${NAMESPACE}
  labels:
    app: fountainrank-backend
spec:
  selector:
    app: fountainrank-backend
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
