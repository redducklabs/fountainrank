apiVersion: batch/v1
kind: CronJob
metadata:
  name: fountainrank-write-attempt-cleanup
  namespace: ${NAMESPACE}
  labels:
    app: fountainrank-write-attempt-cleanup
    component: backend
spec:
  schedule: "37 * * * *"
  timeZone: "Etc/UTC"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: fountainrank-write-attempt-cleanup
            component: backend
            version: ${IMAGE_TAG}
        spec:
          restartPolicy: OnFailure
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          imagePullSecrets:
            - name: regcred
          volumes:
            - name: db-ca
              secret:
                secretName: fountainrank-secrets
                items:
                  - key: database-ca.crt
                    path: database-ca.crt
            - name: tmp
              emptyDir: {}
          containers:
            - name: write-attempt-cleanup
              image: ${REGISTRY}/fountainrank-backend:${IMAGE_TAG}
              command:
                - python
                - -m
                - app.write_attempt_cleanup
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: fountainrank-secrets
                      key: database-url
                - name: DB_SSL_ROOT_CERT
                  value: /var/run/secrets/fountainrank/database-ca.crt
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: db-ca
                  mountPath: /var/run/secrets/fountainrank
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "25m"
                limits:
                  memory: "128Mi"
                  cpu: "100m"
