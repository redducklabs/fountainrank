name: Bug report
description: Report a defect in the backend, web, mobile, or infra.
labels: [bug]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options: [backend, web, mobile, infra, other]
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser/device, commit SHA.
    validations:
      required: false
