version: 2
updates:
  # `uv` (not `pip`): this is a uv.lock project gated by `uv sync --frozen`, so
  # Dependabot must update pyproject.toml AND uv.lock together. The `pip` ecosystem
  # would update pyproject without maintaining uv.lock -> `uv sync --frozen` fails CI.
  - package-ecosystem: uv
    directory: "/backend"
    schedule:
      interval: weekly
    groups:
      backend-python:
        patterns: ["*"]
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build"

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    # Hold ESLint at 9.x. ESLint 10 removed the `context.getFilename()` API that
    # `eslint-plugin-react@7.37.5` still calls (pulled in transitively via
    # `eslint-config-expo`), so `eslint@10 + eslint-plugin-react@7.37.5` crashes the
    # `mobile:lint`/`workspace-js` CI jobs ("contextOrFilename.getFilename is not a
    # function"). eslint-config-expo/next both peer-accept eslint >=9, so everything
    # else can still update. Revisit (drop this ignore) once the React/Expo lint stack
    # ships an ESLint 10-compatible eslint-plugin-react.
    ignore:
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
    groups:
      frontend-js:
        patterns: ["*"]
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      gha:
        patterns: ["*"]
    commit-message:
      prefix: "ci"
