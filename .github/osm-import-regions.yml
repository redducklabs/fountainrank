  # ---- #131 worldwide rollout (v1): per-country/region scopes across all six continents,
  # smaller-first. Paths HEAD-verified against download.geofabrik.de. Antimeridian-crossing
  # extracts (Fiji, NZ Chathams, far-east Russia) are intentionally excluded — the planar
  # poly orientation + the PostGIS ST_Area guard would fail closed on them. The long tail is
  # added by appending rows here (the workflow reads this file from the checkout at dispatch).

  # North America (Central America)
