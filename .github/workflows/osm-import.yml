name: OSM Import

# Operator-triggered OSM drinking-water import (spec: docs/specs/2026-06-21-osm-fountain-ingestion-design.md,
# runbook: docs/runbooks/osm-fountain-import.md). Fetches an Overpass extract for a bbox, converts
# it to the importer's GeoJSON shape, streams it into an isolated one-shot Kubernetes Job (via
# `.github/actions/run-loader-job`), and runs the already-deployed importer CLI there (the Job holds
# the prod DATABASE_URL; a cancelled run can't orphan the loader). dry_run defaults TRUE: nothing is
# written to `fountains` unless an
# operator explicitly unticks it. Bounded bbox + Overpass is fine for cities/regions; switch to a
# Geofabrik/PBF source for production-scale (US/world) extents.

on:
  workflow_dispatch:
    inputs:
      bbox:
        description: "Overpass bbox: south,west,north,east (lat,lon decimals)"
        required: true
      scope_id:
        description: "Canonical scope id, e.g. us/ca/san-diego (used for scope-limited removal)"
        required: true
      dataset:
        description: "Non-secret dataset id, e.g. overpass:san-diego (NEVER a URL)"
        required: true
      label:
        description: "Human label, e.g. San Diego"
        required: true
      dry_run:
        description: "Dry run (no writes to fountains; only staging run + candidates)"
        type: boolean
        default: true

concurrency:
  # ALL operator workflows that take ADD_FOUNTAIN_LOCK during their membership refresh share this
  # group so they never contend on the lock; queue: max lets a bulk fan-out enqueue every dispatch
  # FIFO instead of the default single-pending behavior that cancels older pending runs.
  group: db-membership-write-production
  cancel-in-progress: false
  queue: max

permissions:
  contents: read

env:
  CLUSTER_NAME: fountainrank-production-cluster
  NAMESPACE: fountainrank

jobs:
  import:
    name: OSM import (operator)
    runs-on: ubuntu-latest # Class B: handles cluster credentials
    environment: production
    steps:
      - uses: actions/checkout@v7

      - name: Validate + sanitize bbox
        env:
          BBOX_IN: ${{ github.event.inputs.bbox }}
        run: |
          # Reject any newline/CR: a multiline value could pass a line-based check and inject
          # extra Overpass statements when interpolated into the query (workflow_dispatch is
          # API-callable, so don't rely on the UI). Then parse into 4 numeric fields,
          # validate range + order + a max extent, and RECONSTRUCT the value so only the
          # validated numbers are ever interpolated downstream.
          case "$BBOX_IN" in
            *$'\n'* | *$'\r'*) echo "::error::bbox must be a single line"; exit 1 ;;
          esac
          IFS=',' read -r S W N E EXTRA <<EOF
          $BBOX_IN
          EOF
          if [ -n "$EXTRA" ]; then echo "::error::bbox must have exactly 4 fields (south,west,north,east)"; exit 1; fi
          for v in "$S" "$W" "$N" "$E"; do
            if ! printf '%s' "$v" | grep -Eq '^-?[0-9]+(\.[0-9]+)?$'; then
              echo "::error::bbox field '$v' is not a decimal"; exit 1
            fi
          done
          awk -v s="$S" -v w="$W" -v n="$N" -v e="$E" 'BEGIN{
            if (s < -90 || s > 90 || n < -90 || n > 90 || w < -180 || w > 180 || e < -180 || e > 180) exit 1;
            if (s >= n || w >= e) exit 2;
            if (n - s > 6 || e - w > 6) exit 3;
          }' || { echo "::error::bbox failed range/order/extent (each side <= 6 deg; use a Geofabrik/PBF source for larger extents)"; exit 1; }
          echo "BBOX=$S,$W,$N,$E" >> "$GITHUB_ENV"

      - name: Validate registry + derive scope bounds
        env:
          SCOPE_ID: ${{ github.event.inputs.scope_id }}
          DATASET: ${{ github.event.inputs.dataset }}
        run: |
          # One-owner control (spec §4): reject unknown/retired/aggregate scopes BEFORE any Overpass
          # fetch, and require the dispatched bbox to equal the registry bbox. Emit a fail-closed
          # scope_bounds rectangle from that registry bbox — the merge removes across the WHOLE
          # scope_id with NO spatial guard when scope_bounds is absent (merge.py:307-333), so this
          # bounds removal to the registered area. $BBOX is the SANITIZED value from the prior step.
          # Ubuntu runners are PEP-668 externally-managed, so `pip install` fails; use the distro
          # PyYAML package (regions.py only needs yaml.safe_load).
          sudo apt-get update && sudo apt-get install -y python3-yaml
          python3 backend/app/imports/regions.py \
            --registry .github/osm-import-regions.yml \
            --source overpass --scope-id "$SCOPE_ID" --dataset "$DATASET" \
            --bbox "$BBOX" --emit-scope-bounds-wkt scope.wkt
          test -s scope.wkt || { echo "::error::scope bounds WKT not emitted"; exit 1; }

      - name: Fetch Overpass extract
        run: |
          # $BBOX is the SANITIZED value from the previous step (via GITHUB_ENV), not the raw input.
          cat > query.txt <<EOF
          [out:json][timeout:240];
          (
            node["amenity"="drinking_water"]($BBOX);
            node["man_made"="water_tap"]["drinking_water"="yes"]($BBOX);
            node["amenity"="fountain"]["drinking_water"="yes"]($BBOX);
            way["amenity"="drinking_water"]($BBOX);
            way["man_made"="water_tap"]["drinking_water"="yes"]($BBOX);
            relation["amenity"="drinking_water"]($BBOX);
            relation["man_made"="water_tap"]["drinking_water"="yes"]($BBOX);
            relation["amenity"="fountain"]["drinking_water"="yes"]($BBOX);
          );
          out center;
          EOF
          curl -sS --fail -A "fountainrank-osm-import/1.0 (https://fountainrank.com)" \
            -H "Accept: application/json" \
            -X POST --data-urlencode "data@query.txt" \
            "https://overpass-api.de/api/interpreter" -o raw.json
          echo "raw bytes: $(wc -c < raw.json)"

      - name: Convert to GeoJSON
        run: |
          n=$(python3 backend/app/imports/overpass.py raw.json import.geojson)
          echo "geojson features: $n"
          if [ "$n" -eq 0 ]; then echo "::error::no features returned for this bbox"; exit 1; fi

      - uses: digitalocean/action-doctl@v2.5.2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save kubeconfig
        run: doctl kubernetes cluster kubeconfig save "$CLUSTER_NAME"

      - name: Build loader inputs
        id: loader
        env:
          SCOPE_ID: ${{ github.event.inputs.scope_id }}
          DATASET: ${{ github.event.inputs.dataset }}
          LABEL: ${{ github.event.inputs.label }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail
          # import.geojson + scope.wkt were produced in the checkout dir (== the action's working
          # dir). BUILD_ID is the import timestamp (as before). json.dumps encodes LABEL (free text)
          # as one argv element and emits single-line JSON safe for $GITHUB_OUTPUT.
          BUILD_ID="$(date -u +%Y-%m-%dT%H-%M-%SZ)"; export BUILD_ID
          python3 - >> "$GITHUB_OUTPUT" <<'PY'
          import json
          import os

          argv = ["python", "-m", "app.imports.cli", "--path", "/work/osm-import.geojson",
                  "--scope-id", os.environ["SCOPE_ID"], "--dataset", os.environ["DATASET"],
                  "--build-id", os.environ["BUILD_ID"], "--label", os.environ["LABEL"],
                  "--scope-bounds-wkt-file", "/work/osm-scope.wkt", "--require-scope-bounds"]
          if os.environ["DRY_RUN"] == "true":
              argv.append("--dry-run")
          files = [{"local": "import.geojson", "container": "/work/osm-import.geojson"},
                   {"local": "scope.wkt", "container": "/work/osm-scope.wkt"}]
          print("argv_json=" + json.dumps(argv))
          print("files_json=" + json.dumps(files))
          PY

      - name: Run Overpass importer (isolated Job)
        uses: ./.github/actions/run-loader-job
        with:
          job_name: osm-import
          namespace: ${{ env.NAMESPACE }}
          active_deadline_seconds: "10800"
          ready_timeout_seconds: "900"
          argv_json: ${{ steps.loader.outputs.argv_json }}
          files_json: ${{ steps.loader.outputs.files_json }}

      - name: Delete loader Job (guaranteed teardown)
        if: always()
        run: kubectl -n "$NAMESPACE" delete job osm-import --ignore-not-found --wait --timeout=60s
