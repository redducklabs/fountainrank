name: OSM Import

# Operator-triggered OSM drinking-water import (spec: docs/specs/2026-06-21-osm-fountain-ingestion-design.md,
# runbook: docs/runbooks/osm-fountain-import.md). Fetches an Overpass extract for a bbox, converts
# it to the importer's GeoJSON shape, streams it into the running backend pod, and runs the
# already-deployed importer CLI there (the pod holds the prod DATABASE_URL — same pattern as the
# deploy's migration step). dry_run defaults TRUE: nothing is written to `fountains` unless an
# operator explicitly unticks it. Bounded bbox + Overpass is fine for cities/regions; switch to a
# Geofabrik/PBF source for production-scale (US/world) extents.

on:
  workflow_dispatch:
    inputs:
      bbox:
        description: "Overpass bbox: south,west,north,east (lat,lon decimals)"
        required: true
      scope_id:
        description: "Canonical scope id, e.g. us/ca/san-diego (used for scope-limited removal)"
        required: true
      dataset:
        description: "Non-secret dataset id, e.g. overpass:san-diego (NEVER a URL)"
        required: true
      label:
        description: "Human label, e.g. San Diego"
        required: true
      dry_run:
        description: "Dry run (no writes to fountains; only staging run + candidates)"
        type: boolean
        default: true

concurrency:
  group: osm-import-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  CLUSTER_NAME: fountainrank-production-cluster
  NAMESPACE: fountainrank

jobs:
  import:
    name: OSM import (operator)
    runs-on: ubuntu-latest # Class B: handles cluster credentials
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Validate bbox
        env:
          BBOX: ${{ github.event.inputs.bbox }}
        run: |
          if ! printf '%s' "$BBOX" | grep -Eq '^-?[0-9]+(\.[0-9]+)?,-?[0-9]+(\.[0-9]+)?,-?[0-9]+(\.[0-9]+)?,-?[0-9]+(\.[0-9]+)?$'; then
            echo "::error::bbox must be 'south,west,north,east' decimals"; exit 1
          fi

      - name: Fetch Overpass extract
        env:
          BBOX: ${{ github.event.inputs.bbox }}
        run: |
          cat > query.txt <<EOF
          [out:json][timeout:240];
          (
            node["amenity"="drinking_water"]($BBOX);
            node["man_made"="water_tap"]["drinking_water"="yes"]($BBOX);
            node["amenity"="fountain"]["drinking_water"="yes"]($BBOX);
            way["amenity"="drinking_water"]($BBOX);
            way["man_made"="water_tap"]["drinking_water"="yes"]($BBOX);
          );
          out center;
          EOF
          curl -sS --fail -A "fountainrank-osm-import/1.0 (https://fountainrank.com)" \
            -H "Accept: application/json" \
            -X POST --data-urlencode "data@query.txt" \
            "https://overpass-api.de/api/interpreter" -o raw.json
          echo "raw bytes: $(wc -c < raw.json)"

      - name: Convert to GeoJSON
        run: |
          n=$(python3 backend/app/imports/overpass.py raw.json import.geojson)
          echo "geojson features: $n"
          if [ "$n" -eq 0 ]; then echo "::error::no features returned for this bbox"; exit 1; fi

      - uses: digitalocean/action-doctl@v2.5.2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save kubeconfig
        run: doctl kubernetes cluster kubeconfig save "$CLUSTER_NAME"

      - name: Run importer in backend pod
        env:
          SCOPE_ID: ${{ github.event.inputs.scope_id }}
          DATASET: ${{ github.event.inputs.dataset }}
          LABEL: ${{ github.event.inputs.label }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          POD="$(kubectl -n "$NAMESPACE" get pod -l app=fountainrank-backend \
            --field-selector=status.phase=Running \
            -o jsonpath='{.items[0].metadata.name}')"
          if [ -z "$POD" ]; then echo "::error::no Running backend pod found"; exit 1; fi
          echo "backend pod: $POD"
          # Stream the GeoJSON into the pod (avoids `kubectl cp`'s tar dependency).
          kubectl -n "$NAMESPACE" exec -i "$POD" -- sh -c 'cat > /tmp/osm-import.geojson' < import.geojson
          DRY=""
          if [ "$DRY_RUN" = "true" ]; then DRY="--dry-run"; fi
          BUILD_ID="$(date -u +%Y-%m-%dT%H-%M-%SZ)"
          echo "::group::importer (dry_run=$DRY_RUN)"
          kubectl -n "$NAMESPACE" exec "$POD" -- \
            python -m app.imports.cli --path /tmp/osm-import.geojson \
            --scope-id "$SCOPE_ID" --dataset "$DATASET" --build-id "$BUILD_ID" \
            --label "$LABEL" $DRY
          echo "::endgroup::"
          kubectl -n "$NAMESPACE" exec "$POD" -- rm -f /tmp/osm-import.geojson
