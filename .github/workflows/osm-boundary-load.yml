name: Boundary Load (Overture division_area)

# Operator-triggered load of Overture Maps Divisions `division_area` admin/place boundaries into
# `place_boundaries` (spec: docs/specs/2026-07-02-crawlable-seo-pages-design.md ┬¦11.3,
# plan: docs/plans/2026-07-02-crawlable-seo-pages.md Slice 1c). This is the CI-only production
# data-load path for boundaries ŌĆö the single write rule (spec ┬¦11.3): validate the dispatched scope
# against the boundary-source registry BEFORE any remote read, fetch the pinned release from
# anonymous public S3 with DuckDB (country + class='land' predicate pushdown ŌĆö MB-scale, no PBF/
# planet download), then stream the GeoJSON into an isolated one-shot Kubernetes Job (via
# `.github/actions/run-loader-job`) and run the already-deployed `app.imports.boundary_cli` there
# (same isolated-Job pattern as osm-import-pbf.yml, so a cancelled run can't orphan the loader). The loader
# PostGIS-validates every geometry (ST_MakeValid -> ST_Multi -> reject non-MultiPolygon) inside its
# write transaction. dry_run defaults TRUE.

on:
  workflow_dispatch:
    inputs:
      scope_id:
        description: "Boundary scope id ŌĆö must match an ACTIVE row in .github/boundary-source-regions.yml, e.g. overture:us"
        required: true
      overture_release_id:
        description: "Pinned Overture release id, e.g. 2026-06-17.0 ŌĆö must equal the scope's pinned value"
        required: true
      dry_run:
        description: "Dry run (parse + PostGIS-validate in the pod; no writes to place_boundaries)"
        type: boolean
        default: true

concurrency:
  # ALL operator workflows that take ADD_FOUNTAIN_LOCK during their membership refresh share this
  # group so they never contend on the lock; queue: max lets a bulk fan-out enqueue every country
  # FIFO instead of the default single-pending behavior that cancels older pending runs.
  group: db-membership-write-production
  cancel-in-progress: false
  queue: max

permissions:
  contents: read

env:
  CLUSTER_NAME: fountainrank-production-cluster
  NAMESPACE: fountainrank
  # Pinned DuckDB (spec ┬¦11.1 vetted 1.5.4; also the current latest stable). Refresh deliberately.
  DUCKDB_VERSION: "1.5.4"

jobs:
  load:
    name: Boundary load (operator)
    runs-on: ubuntu-latest # Class B: handles cluster credentials
    environment: production
    steps:
      - uses: actions/checkout@v7

      - name: Validate registry (fail-closed, before any remote read)
        env:
          SCOPE_ID: ${{ github.event.inputs.scope_id }}
          RELEASE_ID: ${{ github.event.inputs.overture_release_id }}
        run: |
          set -euo pipefail
          # workflow_dispatch is API-callable ŌĆö reject newline/CR before anything else.
          case "$SCOPE_ID" in
            *$'\n'* | *$'\r'*) echo "::error::scope_id must be a single line"; exit 1 ;;
          esac
          case "$RELEASE_ID" in
            *$'\n'* | *$'\r'*) echo "::error::overture_release_id must be a single line"; exit 1 ;;
          esac
          # Ubuntu runners are PEP-668 externally-managed, so `pip install` fails; use the distro
          # PyYAML package (boundaries_registry.py only needs yaml.safe_load), same as osm-import-pbf.
          sudo apt-get update && sudo apt-get install -y python3-yaml
          python3 backend/app/imports/boundaries_registry.py \
            --registry .github/boundary-source-regions.yml \
            --scope-id "$SCOPE_ID" --release-id "$RELEASE_ID" \
            --emit-country "$RUNNER_TEMP/country"
          COUNTRY="$(cat "$RUNNER_TEMP/country")"
          # Defense-in-depth: the emitted country feeds a SQL predicate ŌĆö re-assert its shape.
          printf '%s' "$COUNTRY" | grep -Eq '^[A-Z]{2}$' \
            || { echo "::error::emitted country failed syntax check"; exit 1; }
          echo "COUNTRY=$COUNTRY" >> "$GITHUB_ENV"
          echo "validated: scope=$SCOPE_ID release=$RELEASE_ID country=$COUNTRY"

      - name: Install DuckDB (pinned) in an isolated venv
        run: |
          set -euo pipefail
          python3 -m venv "$RUNNER_TEMP/ddb"
          "$RUNNER_TEMP/ddb/bin/pip" install --quiet --disable-pip-version-check \
            "duckdb==${DUCKDB_VERSION}"
          "$RUNNER_TEMP/ddb/bin/python" -c "import duckdb; print('duckdb', duckdb.__version__)"

      - name: Fetch division_area from the pinned Overture release (anonymous S3)
        env:
          RELEASE_ID: ${{ github.event.inputs.overture_release_id }}
        run: |
          set -euo pipefail
          # Re-assert both values before they build the S3 path / SQL predicate (already validated by
          # the registry step, but the fetch must be safe on its own). Their strict shapes
          # (release: YYYY-MM-DD.N, country: [A-Z]{2}) contain no quotes/spaces/path separators, so
          # string-building the SQL below has no injection surface.
          printf '%s' "$RELEASE_ID" | grep -Eq '^[0-9]{4}-[0-9]{2}-[0-9]{2}\.[0-9]+$' \
            || { echo "::error::overture_release_id failed syntax check"; exit 1; }
          printf '%s' "$COUNTRY" | grep -Eq '^[A-Z]{2}$' \
            || { echo "::error::country failed syntax check"; exit 1; }
          OUT="$RUNNER_TEMP/division_area.geojsonl"
          echo "OUT=$OUT" >> "$GITHUB_ENV"
          "$RUNNER_TEMP/ddb/bin/python" - "$RELEASE_ID" "$COUNTRY" "$OUT" <<'PY'
          import sys

          import duckdb

          release_id, country, out = sys.argv[1], sys.argv[2], sys.argv[3]
          # Path/predicate are built ONLY from the regex-validated release_id + country (no quotes
          # possible), so this is injection-safe (spec ┬¦11.3).
          s3 = (
              "s3://overturemaps-us-west-2/release/"
              f"{release_id}/theme=divisions/type=division_area/*.parquet"
          )
          con = duckdb.connect()
          for stmt in (
              "INSTALL spatial",
              "LOAD spatial",
              "INSTALL httpfs",
              "LOAD httpfs",
              "SET s3_region='us-west-2'",  # anonymous public read; no credentials (spec ┬¦11.1)
          ):
              con.execute(stmt)
          # Materialize the filtered set once (single S3 scan), count it, then export. `id AS
          # overture_id` keeps GDAL from promoting a literal `id` to the feature top level;
          # `names.primary AS name`; ST_Multi coerces Overture's mixed Polygon/MultiPolygon.
          con.execute(
              f"""
              CREATE TEMP TABLE b AS
              SELECT id AS overture_id, division_id, subtype, class, admin_level,
                     names.primary AS name, country, region, sources,
                     ST_Multi(geometry) AS geometry
              FROM read_parquet('{s3}')
              WHERE country = '{country}' AND class = 'land'
                AND subtype IN ('country','region','county','localadmin','locality')
              """
          )
          cnt = con.execute("SELECT count(*) FROM b").fetchone()[0]
          print(f"division_area land features for {country} @ {release_id}: {cnt}")
          if cnt == 0:
              # Fail closed: an empty pull means a bad country/release or a coverage regression.
              sys.exit("::error::0 features fetched ŌĆö fail closed (check scope/release)")
          # GeoJSONSeq = one Feature per line, so the loader can stream + batch it instead of
          # holding a whole FeatureCollection in memory (country-scale loads OOM-killed the pod).
          con.execute(
              f"COPY b TO '{out}' WITH (FORMAT GDAL, DRIVER 'GeoJSONSeq')"
          )
          PY
          test -s "$OUT" || { echo "::error::GeoJSON not produced"; exit 1; }
          echo "wrote $OUT ($(wc -c < "$OUT") bytes)"

      - uses: digitalocean/action-doctl@v2.5.2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save kubeconfig
        run: doctl kubernetes cluster kubeconfig save "$CLUSTER_NAME"

      - name: Build loader inputs
        id: loader
        env:
          SCOPE_ID: ${{ github.event.inputs.scope_id }}
          RELEASE_ID: ${{ github.event.inputs.overture_release_id }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail
          # OUT is already exported from an earlier GITHUB_ENV step. json.dumps emits single-line
          # JSON (safe for $GITHUB_OUTPUT) and encodes every value as one argv element.
          python3 - >> "$GITHUB_OUTPUT" <<'PY'
          import json
          import os

          argv = ["python", "-m", "app.imports.boundary_cli", "--path", "/work/boundary.geojsonl",
                  "--overture-release-id", os.environ["RELEASE_ID"], "--scope-id", os.environ["SCOPE_ID"]]
          if os.environ["DRY_RUN"] == "true":
              argv.append("--dry-run")
          files = [{"local": os.environ["OUT"], "container": "/work/boundary.geojsonl"}]
          print("argv_json=" + json.dumps(argv))
          print("files_json=" + json.dumps(files))
          PY

      - name: Run boundary loader (isolated Job)
        uses: ./.github/actions/run-loader-job
        with:
          job_name: boundary-load
          namespace: ${{ env.NAMESPACE }}
          active_deadline_seconds: "5400"
          ready_timeout_seconds: "600"
          argv_json: ${{ steps.loader.outputs.argv_json }}
          files_json: ${{ steps.loader.outputs.files_json }}

      - name: Delete loader Job (guaranteed teardown)
        if: always()
        run: kubectl -n "$NAMESPACE" delete job boundary-load --ignore-not-found --wait --timeout=60s
