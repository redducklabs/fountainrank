name: Mobile Store Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      platform:
        description: "Mobile platform to build and submit"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - android
          - ios

concurrency:
  group: mobile-store-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-notes:
    name: Generate store release notes
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.notes.outputs.body }}
      store_body: ${{ steps.notes.outputs.store_body }}
      range: ${{ steps.notes.outputs.range }}
      app_version: ${{ steps.notes.outputs.app_version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Generate PR list
        id: notes
        shell: bash
        run: |
          set -euo pipefail

          current_ref="$GITHUB_SHA"
          current_label="${GITHUB_REF_NAME:-$GITHUB_SHA}"
          configured_version="$(sed -nE 's/^const defaultAppVersion = "([0-9]+\.[0-9]+\.[0-9]+)";$/\1/p' mobile/app.config.ts | head -n 1)"
          semver_pattern='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'

          if [ -z "$configured_version" ]; then
            echo "::error::Could not read the default Expo app version from mobile/app.config.ts."
            exit 1
          fi
          if ! printf '%s' "$configured_version" | grep -Eq "$semver_pattern"; then
            echo "::error::Default Expo app version must be strict semver without leading zeroes. Got $configured_version."
            exit 1
          fi

          increment_patch() {
            local version="$1"
            local major minor patch
            IFS=. read -r major minor patch <<< "$version"
            printf '%s.%s.%s\n' "$major" "$minor" "$((10#$patch + 1))"
          }

          version_ge() {
            [ "$(printf '%s\n%s\n' "$1" "$2" | sort -V | tail -n 1)" = "$1" ]
          }

          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            app_version="${GITHUB_REF_NAME#v}"
            if ! printf '%s' "$app_version" | grep -Eq "$semver_pattern"; then
              echo "::error::Mobile store release tags must match strict vMAJOR.MINOR.PATCH without leading zeroes. Got ${GITHUB_REF_NAME}."
              exit 1
            fi
          else
            latest_version="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | sed 's/^v//' | grep -E "$semver_pattern" | head -n 1 || true)"
            if [ -n "$latest_version" ] && version_ge "$latest_version" "$configured_version"; then
              app_version="$(increment_patch "$latest_version")"
            else
              app_version="$configured_version"
            fi
          fi

          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            previous_ref="$(git tag --merged "$current_ref" --list 'v*.*.*' --sort=-version:refname | grep -v "^${GITHUB_REF_NAME}$" | head -n 1 || true)"
          else
            previous_ref="$(git describe --tags --match 'v*.*.*' --abbrev=0 "$current_ref" 2>/dev/null || true)"
          fi

          if [ -n "$previous_ref" ]; then
            range="${previous_ref}..${current_ref}"
            range_label="${previous_ref}..${current_label}"
          else
            first_commit="$(git rev-list --max-parents=0 "$current_ref" | tail -n 1)"
            range="${first_commit}..${current_ref}"
            range_label="${first_commit}..${current_label}"
          fi

          # Prefer squash-merged PR subjects ("<title> (#NN)" -> "- #NN <title>"). Also
          # include un-suffixed feat:/fix: commits so a user-facing change still appears
          # when it landed without a PR ref (a pre-PR-era or mis-suffixed commit), and so
          # a range that happens to contain no (#NN) refs does not fail the release.
          notes_file="$RUNNER_TEMP/mobile-store-release-notes.txt"
          store_notes_file="$RUNNER_TEMP/mobile-store-title-notes.txt"
          play_notes_file="$RUNNER_TEMP/mobile-store-play-whats-new.txt"
          git log --reverse --pretty=format:'%s' "$range" \
            | awk -v notes_file="$notes_file" -v store_notes_file="$store_notes_file" '
                {
                  if (match($0, /\(#[0-9]+\)$/)) {
                    ref = substr($0, RSTART + 1, RLENGTH - 2)
                    subj = substr($0, 1, RSTART - 1)
                    sub(/[[:space:]]+$/, "", subj)
                    line = "- " ref " " subj
                    store_line = "- " subj
                  } else if ($0 ~ /^(feat|fix)(\(|!|:)/) {
                    line = "- " $0
                    store_line = line
                  } else {
                    next
                  }
                  gsub(/[[:space:]]*\(#[^)]+\)/, "", store_line)
                  if (!seen[line]++) print line > notes_file
                  if (!store_seen[store_line]++) print store_line > store_notes_file
                }
              '

          if [ ! -s "$notes_file" ]; then
            echo "::error::No PR or feat/fix commits found in $range_label. Store release notes must list the user-facing changes included in the app-store release."
            exit 1
          fi

          python3 - "$store_notes_file" "$play_notes_file" <<'PY'
          import pathlib
          import sys

          source = pathlib.Path(sys.argv[1])
          target = pathlib.Path(sys.argv[2])
          limit = 500
          overflow = "- More updates in this release."
          lines = [line for line in source.read_text(encoding="utf-8").splitlines() if line.strip()]
          selected = []
          truncated = False

          for line in lines:
              candidate_lines = [*selected, line]
              if len("\n".join(candidate_lines)) <= limit:
                  selected.append(line)
              else:
                  truncated = True
                  break

          if truncated:
              while selected and len("\n".join([*selected, overflow])) > limit:
                  selected.pop()
              selected.append(overflow)

          target.write_text("\n".join(selected) + "\n", encoding="utf-8")
          PY

          {
            echo "### Store release notes"
            echo
            echo "Range: \`$range_label\`"
            echo
            echo "App version: \`$app_version\`"
            echo
            cat "$notes_file"
            echo
            echo "### Full title-only notes"
            echo
            cat "$store_notes_file"
            echo
            echo "### Google Play \"What's new\""
            echo
            cat "$play_notes_file"
          } >> "$GITHUB_STEP_SUMMARY"

          {
            echo "body<<EOF"
            cat "$notes_file"
            echo "EOF"
            echo "store_body<<EOF"
            cat "$play_notes_file"
            echo "EOF"
            echo "range=$range_label"
            echo "app_version=$app_version"
          } >> "$GITHUB_OUTPUT"

  android:
    name: Android build + Play production submit
    needs: release-notes
    if: ${{ github.event_name == 'push' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android' }}
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 90
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_APP_VERSION: ${{ needs.release-notes.outputs.app_version }}
      EAS_BUILD_NO_EXPO_GO_WARNING: "true"
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
      PLAY_RELEASE_NOTES: ${{ needs.release-notes.outputs.store_body }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v6.0.9
      - name: Verify required secrets
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::Missing production secret EXPO_TOKEN. Create an Expo access token for the red-duck-labs account/org and add it to the production GitHub environment."
            exit 1
          fi
          if [ -z "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" ]; then
            echo "::error::Missing production secret GOOGLE_PLAY_SERVICE_ACCOUNT_JSON. Add a Google Play service-account key with Android Publisher access so CI can set the production release \"What's new\" text."
            exit 1
          fi
          # EAS also manages a Google Play service-account key for upload. If
          # that credential is missing, the auto-submit step fails explicitly.
          echo "This workflow also requires EAS-managed Google Play submit credentials for com.redducklabs.fountainrank."
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify Expo authentication
        run: pnpm dlx eas-cli@20.3.0 whoami
        working-directory: mobile
      - name: Show Play release notes
        run: |
          {
            echo "Google Play release notes for ${RELEASE_RANGE}:"
            echo
            printf '%s\n' "$PLAY_RELEASE_NOTES"
            echo
            echo "Android app version: ${EXPO_APP_VERSION}"
            echo
            echo "Android auto-publishes to the Google Play production track (releaseStatus: completed), then updates the production release's \"What's new\" text from the title-only notes above."
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          RELEASE_RANGE: ${{ needs.release-notes.outputs.range }}
      - name: Build Android app bundle
        id: android-build
        run: |
          set -euo pipefail
          build_json="$RUNNER_TEMP/eas-android-build.json"
          pnpm dlx eas-cli@20.3.0 build \
            --platform android \
            --profile production \
            --json \
            --wait \
            > "$build_json"

          node "$GITHUB_WORKSPACE/scripts/ci/extract-eas-android-build.cjs" "$build_json" >> "$GITHUB_OUTPUT"
        working-directory: mobile
      - name: Submit Android app bundle to Google Play production
        run: >
          pnpm dlx eas-cli@20.3.0 submit
          --platform android
          --profile production
          --id "$ANDROID_BUILD_ID"
          --non-interactive
          --wait
        working-directory: mobile
        env:
          ANDROID_BUILD_ID: ${{ steps.android-build.outputs.build_id }}
      - name: Update Google Play release notes
        env:
          ANDROID_PACKAGE_NAME: com.redducklabs.fountainrank
          GOOGLE_PLAY_TRACK: production
          GOOGLE_PLAY_RELEASE_NOTES_LANGUAGE: en-US
          EXPECTED_ANDROID_VERSION_CODE: ${{ steps.android-build.outputs.version_code }}
        run: |
          node <<'NODE'
          const crypto = require("node:crypto");

          async function main() {
            const packageName = process.env.ANDROID_PACKAGE_NAME;
            const trackName = process.env.GOOGLE_PLAY_TRACK;
            const language = process.env.GOOGLE_PLAY_RELEASE_NOTES_LANGUAGE;
            const notes = process.env.PLAY_RELEASE_NOTES;
            const rawKey = process.env.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON;
            const expectedVersionCode = Number(process.env.EXPECTED_ANDROID_VERSION_CODE);

            if (!notes || notes.trim().length === 0) {
              throw new Error("PLAY_RELEASE_NOTES is empty; refusing to publish blank Google Play release notes.");
            }
            if (!Number.isSafeInteger(expectedVersionCode) || expectedVersionCode <= 0) {
              throw new Error(`EXPECTED_ANDROID_VERSION_CODE must be a positive integer; got ${process.env.EXPECTED_ANDROID_VERSION_CODE}.`);
            }

            if ([...notes].length > 500) {
              throw new Error(`Google Play release notes must be 500 Unicode characters or fewer; got ${[...notes].length}.`);
            }

            const key = JSON.parse(rawKey);
            const encode = (value) =>
              Buffer.from(typeof value === "string" ? value : JSON.stringify(value)).toString("base64url");

            const now = Math.floor(Date.now() / 1000);
            const unsignedJwt = [
              encode({ alg: "RS256", typ: "JWT" }),
              encode({
                iss: key.client_email,
                scope: "https://www.googleapis.com/auth/androidpublisher",
                aud: "https://oauth2.googleapis.com/token",
                exp: now + 3600,
                iat: now,
              }),
            ].join(".");
            const signature = crypto.sign("RSA-SHA256", Buffer.from(unsignedJwt), key.private_key).toString("base64url");
            const assertion = `${unsignedJwt}.${signature}`;

            const tokenResponse = await fetch("https://oauth2.googleapis.com/token", {
              method: "POST",
              headers: { "content-type": "application/x-www-form-urlencoded" },
              body: new URLSearchParams({
                grant_type: "urn:ietf:params:oauth:grant-type:jwt-bearer",
                assertion,
              }),
            });
            const tokenBody = await tokenResponse.json();
            if (!tokenResponse.ok) {
              throw new Error(`Google OAuth token request failed (${tokenResponse.status}): ${JSON.stringify(tokenBody)}`);
            }
            const accessToken = tokenBody.access_token;

            async function request(path, options = {}) {
              const response = await fetch(`https://androidpublisher.googleapis.com/androidpublisher/v3${path}`, {
                ...options,
                headers: {
                  authorization: `Bearer ${accessToken}`,
                  "content-type": "application/json",
                  ...(options.headers ?? {}),
                },
              });
              const text = await response.text();
              if (!response.ok) {
                throw new Error(`${options.method ?? "GET"} ${path} failed (${response.status}): ${text}`);
              }
              return text ? JSON.parse(text) : {};
            }

            const edit = await request(`/applications/${packageName}/edits`, { method: "POST" });
            const track = await request(
              `/applications/${packageName}/edits/${encodeURIComponent(edit.id)}/tracks/${encodeURIComponent(trackName)}`,
            );

            const releases = track.releases ?? [];
            if (releases.length === 0) {
              throw new Error(`No releases found on Google Play track ${trackName}.`);
            }

            const matchingReleases = releases
              .map((release, index) => ({ release, index }))
              .filter(({ release }) => (release.versionCodes ?? []).map((code) => Number(code)).includes(expectedVersionCode));

            if (matchingReleases.length !== 1) {
              throw new Error(
                `Expected exactly one Google Play ${trackName} release containing versionCode ${expectedVersionCode}, found ${matchingReleases.length}. Refusing to update release notes for the wrong release.`,
              );
            }

            const [matchingRelease] = matchingReleases;
            releases[matchingRelease.index] = {
              ...matchingRelease.release,
              releaseNotes: [{ language, text: notes }],
            };

            await request(
              `/applications/${packageName}/edits/${encodeURIComponent(edit.id)}/tracks/${encodeURIComponent(trackName)}`,
              {
                method: "PUT",
                body: JSON.stringify({ track: trackName, releases }),
              },
            );
            await request(`/applications/${packageName}/edits/${encodeURIComponent(edit.id)}:commit`, { method: "POST" });

            console.log(
              `Updated Google Play ${trackName} release notes for versionCode ${expectedVersionCode}.`,
            );
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

  ios:
    name: iOS build + App Store Connect submit
    needs: release-notes
    if: ${{ github.event_name == 'push' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'ios' }}
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 90
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_APP_VERSION: ${{ needs.release-notes.outputs.app_version }}
      EAS_BUILD_NO_EXPO_GO_WARNING: "true"
      TESTFLIGHT_RELEASE_NOTES: ${{ needs.release-notes.outputs.body }}
      # This bundle id previously failed EAS capability sync for APPLE_ID_AUTH;
      # the app does not need EAS to modify entitlements during CI store builds.
      EXPO_NO_CAPABILITY_SYNC: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v6.0.9
      - name: Verify required secrets
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::Missing production secret EXPO_TOKEN. Create an Expo access token for the red-duck-labs account/org and add it to the production GitHub environment."
            exit 1
          fi
          echo "This workflow also requires EAS-managed App Store Connect API credentials for App Store app 6782199873."
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify Expo authentication
        run: pnpm dlx eas-cli@20.3.0 whoami
        working-directory: mobile
      - name: Show TestFlight release notes
        run: |
          {
            echo "TestFlight \"What to Test\" notes for ${RELEASE_RANGE}:"
            echo
            printf '%s\n' "$TESTFLIGHT_RELEASE_NOTES"
            echo
            echo "iOS app version: ${EXPO_APP_VERSION}"
            echo
            echo "EAS hosted submission only sets the TestFlight changelog on the Enterprise plan, so the build is submitted without it. Paste these notes into the TestFlight \"What to Test\" field in App Store Connect after the build finishes processing."
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          RELEASE_RANGE: ${{ needs.release-notes.outputs.range }}
      - name: Build and submit iOS to App Store Connect
        # NOTE: do NOT pass --what-to-test here. EAS hosted submission rejects the
        # `changelog` parameter on non-Enterprise plans ("Changelog submission is
        # currently available for Enterprise plan only"), which fails the whole
        # submit. The notes are printed above for manual paste instead.
        run: >
          pnpm dlx eas-cli@20.3.0 build
          --platform ios
          --profile production
          --auto-submit-with-profile production
          --non-interactive
          --wait
        working-directory: mobile
