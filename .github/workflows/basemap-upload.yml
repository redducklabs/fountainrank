name: Basemap Upload

# Uploads the Protomaps Light basemap (style + fonts + sprites + a planet/extract
# PMTiles) to the fountainrank-basemap DO Spaces bucket.
#
# Runs on a MONTHLY schedule (auto-discovers + uploads the latest Protomaps daily build,
# skipping the transfer if the source is unchanged) AND on demand via workflow_dispatch.
#
# The ~127 GB planet transfer runs on an EPHEMERAL sfo3 droplet (resumable download to disk
# + intra-region multipart upload) — NOT streamed through the runner. The runner keeps the
# resolve/skip/marker, asset/style upload, CDN purge, and smoke. See
# docs/specs/2026-06-21-basemap-refresh-droplet-design.md. A daily basemap-janitor reaps
# any leaked worker droplet/key.
#
# Class B job: handles SPACES + DigitalOcean secrets → runs on ubuntu-latest +
# environment: production (mirrors the Terraform apply + deploy jobs).
#
# Planet builds: https://build.protomaps.com/YYYYMMDD.pmtiles (~127 GB). Leave pmtiles_url
# blank (or let the monthly cron run) to auto-discover the latest available build.

on:
  workflow_dispatch:
    inputs:
      pmtiles_url:
        description: >
          Explicit .pmtiles source → s3://fountainrank-basemap/planet.pmtiles. Leave BLANK
          to auto-discover the latest Protomaps daily build. A regional extract URL is a
          quicker alternative to the ~127 GB planet for test runs. Must be https on port 443.
        required: false
        type: string
      upload_assets:
        description: "Also (re)upload style JSON, fonts, and sprites."
        required: false
        default: true
        type: boolean
      force:
        description: "Re-transfer the planet even if the source size is unchanged since last upload."
        required: false
        default: false
        type: boolean
  schedule:
    # Monthly (1st @ 04:00 UTC) — keep the self-hosted basemap current with Protomaps/OSM.
    - cron: "0 4 1 * *"

concurrency:
  group: basemap-upload
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  upload:
    name: Upload basemap to DO Spaces
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 150
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_KEY }}
      CDN_HOST: fountainrank-basemap.sfo3.cdn.digitaloceanspaces.com
      BUCKET: s3://fountainrank-basemap
      ENDPOINT: https://sfo3.digitaloceanspaces.com
      # Raw operator input (may be blank → auto-discover the latest build in the resolve step).
      PMTILES_INPUT: ${{ github.event.inputs.pmtiles_url }}
      # Assets are (re)uploaded on every scheduled run, and on dispatch when upload_assets=true.
      UPLOAD_ASSETS: ${{ github.event_name == 'schedule' || github.event.inputs.upload_assets == 'true' }}
      FORCE: ${{ github.event.inputs.force == 'true' }}
      # Pin basemaps-assets to an immutable commit (reproducible fonts/sprites that match
      # the pinned @protomaps/basemaps style generator). Bump deliberately, not silently.
      ASSETS_REF: 028c18f713baecad011301ff7a69acc39bcc2ae7

    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2.5.2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure aws-cli for DO Spaces
        run: |
          aws configure set default.region us-east-1
          aws configure set default.s3.endpoint_url "$ENDPOINT"
          # Tune multipart to stay under the 10,000-part limit for large planet files.
          # 64 MB × 10 000 parts = 640 GB max — safely covers the ~127 GB planet.
          aws configure set default.s3.multipart_chunksize 64MB
          aws configure set default.s3.multipart_threshold 64MB

      - name: Resolve source build + change detection
        run: |
          set -o pipefail
          URL="$PMTILES_INPUT"
          if [ -z "$URL" ]; then
            echo "No pmtiles_url given — auto-discovering the latest Protomaps daily build…"
            for i in $(seq 0 14); do
              d=$(date -u -d "-${i} day" +%Y%m%d)
              cand="https://build.protomaps.com/${d}.pmtiles"
              if curl -sfI "$cand" >/dev/null 2>&1; then URL="$cand"; break; fi
            done
          fi
          if [ -z "$URL" ]; then echo "::error::No Protomaps build found in the last 14 days."; exit 1; fi
          # The pmtiles_url is fetched by a privileged droplet — validate with real URL parsing
          # + DNS resolution; reject control chars (env-injection), non-443 ports, and ANY
          # private/loopback/link-local/reserved/multicast address (IPv4+IPv6, SSRF). Emit the
          # host + a validated public IP to pin the later fetch (closes redirect/rebind bypass).
          if ! VALIDATED=$(python3 - "$URL" <<'PY'
          import sys, socket, ipaddress
          from urllib.parse import urlparse
          raw = sys.argv[1]
          if any(ord(c) < 0x20 or ord(c) == 0x7f for c in raw):
              sys.exit("control characters in URL")
          u = urlparse(raw)
          if u.scheme != "https":
              sys.exit("must be https")
          if u.username or u.password:
              sys.exit("userinfo not allowed")
          try:
              port = u.port
          except ValueError:
              sys.exit("invalid port")
          if port not in (None, 443):
              sys.exit("only port 443 allowed")
          host = u.hostname
          if not host:
              sys.exit("no host")
          ips = {i[4][0] for i in socket.getaddrinfo(host, 443, proto=socket.IPPROTO_TCP)}
          if not ips:
              sys.exit("no resolution")
          for ip in ips:
              a = ipaddress.ip_address(ip)
              if a.is_private or a.is_loopback or a.is_link_local or a.is_reserved or a.is_multicast or a.is_unspecified:
                  sys.exit(f"non-public address {ip}")
          print(host, sorted(ips)[0])
          PY
          ); then echo "::error::pmtiles_url failed validation"; exit 1; fi
          SRC_HOST=${VALIDATED%% *}; SRC_IP=${VALIDATED##* }
          # content-length is the change signal (daily builds differ in size).
          SRC_LEN=$(curl -sfI "$URL" | grep -i '^content-length:' | tr -d '\r' | awk '{print $2}')
          case "$SRC_LEN" in ''|*[!0-9]*) echo "::error::source Content-Length not numeric: '$SRC_LEN'"; exit 1 ;; esac
          LAST_LEN=""
          if aws s3 cp "${BUCKET}/planet.pmtiles.meta" last.meta --endpoint-url "$ENDPOINT" >/dev/null 2>&1; then
            LAST_LEN=$(tr -d '\r\n ' < last.meta)
          fi
          SKIP=false
          if [ "$FORCE" != "true" ] && [ -n "$LAST_LEN" ] && [ "$SRC_LEN" = "$LAST_LEN" ]; then SKIP=true; fi
          SAFE=$(printf '%s' "$URL" | sed -E 's#(https?://)[^/@]*@#\1#; s#\?.*$##')
          echo "Resolved source: ${SAFE} (content-length=${SRC_LEN}; last uploaded=${LAST_LEN:-none}; skip_stream=${SKIP})"
          {
            echo "RESOLVED_URL=$URL"
            echo "SRC_HOST=$SRC_HOST"
            echo "SRC_IP=$SRC_IP"
            echo "SRC_LEN=$SRC_LEN"
            echo "SKIP_STREAM=$SKIP"
          } >> "$GITHUB_ENV"

      - name: Upload fonts and sprites
        if: ${{ env.UPLOAD_ASSETS == 'true' }}
        run: |
          # Download basemaps-assets (fonts + sprites) pinned to an immutable commit (ASSETS_REF).
          curl -fL -o basemaps-assets.zip \
            "https://github.com/protomaps/basemaps-assets/archive/${ASSETS_REF}.zip"
          unzip -q basemaps-assets.zip

          # Upload fonts (PBF glyphs) — public-read
          aws s3 cp "basemaps-assets-${ASSETS_REF}/fonts/" \
            "${BUCKET}/fonts/" \
            --recursive \
            --acl public-read \
            --endpoint-url "$ENDPOINT"

          # Upload sprites (v3 + v4 both present; the style references v4/light) — public-read
          aws s3 cp "basemaps-assets-${ASSETS_REF}/sprites/" \
            "${BUCKET}/sprites/" \
            --recursive \
            --acl public-read \
            --endpoint-url "$ENDPOINT"

          echo "Fonts and sprites uploaded."

      - name: Generate and upload Light style JSON
        if: ${{ env.UPLOAD_ASSETS == 'true' }}
        run: |
          # @protomaps/basemaps is the successor to protomaps-themes-base; it exports
          # layers() + namedFlavor(). Pinned so the style matches the pinned ASSETS_REF.
          npm install --no-save @protomaps/basemaps@5.7.2

          # Generate the Light MapLibre style as JSON. Sources, glyphs, and sprite all
          # point at the CDN paths we upload to.
          node - > style.light.json <<'EOF'
          const { layers, namedFlavor } = require("@protomaps/basemaps");

          const CDN_HOST = process.env.CDN_HOST;

          const style = {
            version: 8,
            glyphs: `https://${CDN_HOST}/fonts/{fontstack}/{range}.pbf`,
            sprite: `https://${CDN_HOST}/sprites/v4/light`,
            sources: {
              protomaps: {
                type: "vector",
                url: `pmtiles://https://${CDN_HOST}/planet.pmtiles`,
                attribution:
                  '<a href="https://protomaps.com">Protomaps</a> © <a href="https://openstreetmap.org">OpenStreetMap</a>',
              },
            },
            layers: layers("protomaps", namedFlavor("light"), { lang: "en" }),
          };

          process.stdout.write(JSON.stringify(style, null, 2));
          EOF

          aws s3 cp style.light.json \
            "${BUCKET}/style.light.json" \
            --acl public-read \
            --content-type "application/json" \
            --endpoint-url "$ENDPOINT"

          echo "style.light.json uploaded."

      # Provision an ephemeral sfo3 worker (intra-region with the bucket). The ~127 GB planet
      # is downloaded resumably to its disk then multipart-uploaded — not streamed through the
      # runner (no resume, ~14 GB runner disk). Destroyed by the always() cleanup below.
      - name: Provision worker droplet
        if: ${{ env.SKIP_STREAM != 'true' }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          # Per-run ephemeral SSH key; the private key stays on the runner.
          ssh-keygen -t ed25519 -N '' -f "$HOME/.ssh/basemap_refresh" -C "basemap-refresh-${GITHUB_RUN_ID}" >/dev/null
          KEY_ID=$(doctl compute ssh-key import "basemap-refresh-${GITHUB_RUN_ID}" \
            --public-key-file "$HOME/.ssh/basemap_refresh.pub" --format ID --no-header)
          echo "SSH_KEY_ID=$KEY_ID" >> "$GITHUB_ENV"
          # Defensive pre-clean: destroy any stale tagged droplets from a prior crashed run.
          for id in $(doctl compute droplet list --tag-name basemap-refresh --format ID --no-header); do
            doctl compute droplet delete "$id" --force || true
          done
          ID=$(doctl compute droplet create "basemap-refresh-${GITHUB_RUN_ID}" \
            --region sfo3 --size s-4vcpu-8gb --image ubuntu-24-04-x64 \
            --ssh-keys "$KEY_ID" --tag-name basemap-refresh --wait --format ID --no-header)
          echo "DROPLET_ID=$ID" >> "$GITHUB_ENV"
          IP=$(doctl compute droplet get "$ID" --format PublicIPv4 --no-header)
          echo "DROPLET_IP=$IP" >> "$GITHUB_ENV"
          echo "Provisioned droplet $ID ($IP)."

      - name: Transfer pmtiles on the droplet
        if: ${{ env.SKIP_STREAM != 'true' }}
        run: |
          set -euo pipefail
          SSH="ssh -i $HOME/.ssh/basemap_refresh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10 root@${DROPLET_IP}"
          # Wait for SSH (cloud-init/boot).
          ready=""
          for i in $(seq 1 40); do if $SSH true 2>/dev/null; then ready=1; break; fi; sleep 10; done
          if [ -z "$ready" ]; then echo "::error::droplet SSH never became ready"; exit 1; fi
          # Secrets + dynamic inputs travel as a printf %q export-prelude over the encrypted SSH
          # stdin (not argv/file/log), ahead of a STATIC single-quoted remote script. Secrets are
          # referenced as shell vars ($AWS_ACCESS_KEY_ID), never the inline secrets context, so
          # they never land in the runner's temp script file.
          {
            printf 'export AWS_ACCESS_KEY_ID=%q\n' "$AWS_ACCESS_KEY_ID"
            printf 'export AWS_SECRET_ACCESS_KEY=%q\n' "$AWS_SECRET_ACCESS_KEY"
            printf 'export SRC_URL=%q\n'  "$RESOLVED_URL"
            printf 'export SRC_HOST=%q\n' "$SRC_HOST"
            printf 'export SRC_IP=%q\n'   "$SRC_IP"
            printf 'export SRC_LEN=%q\n'  "$SRC_LEN"
            printf 'export ENDPOINT=%q\n' "$ENDPOINT"
            printf 'export BUCKET=%q\n'   "$BUCKET"
            cat <<'REMOTE'
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          # Ubuntu 24.04 dropped the apt 'awscli' package — install AWS CLI v2 (pinned) from the official zip.
          apt-get update -qq && apt-get install -yqq curl unzip ca-certificates >/dev/null
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64-2.35.9.zip" -o /tmp/awscliv2.zip
          # Verify the installer's integrity before executing it (pinned SHA256 of 2.35.9) — the
          # droplet runs it with Spaces creds in env, so an unverified download is a supply-chain risk.
          echo "b331d4822a22612915f22f89cfd0e07895c7b6837999fca8fb9f6c2a370a54c0  /tmp/awscliv2.zip" | sha256sum -c -
          unzip -q /tmp/awscliv2.zip -d /tmp
          /tmp/aws/install
          export PATH=/usr/local/bin:$PATH
          aws configure set default.region us-east-1
          aws configure set default.s3.endpoint_url "$ENDPOINT"
          aws configure set default.s3.multipart_chunksize 64MB
          aws configure set default.s3.multipart_threshold 64MB
          # Preflight disk: require SRC_LEN + 10 GiB free (GiB-vs-GB + OS/package overhead).
          avail=$(df -B1 --output=avail /root | tail -1 | tr -d ' ')
          need=$(( SRC_LEN + 10 * 1024 * 1024 * 1024 ))
          if [ "$avail" -lt "$need" ]; then echo "insufficient disk: avail=$avail need=$need" >&2; exit 1; fi
          # Resumable download. curl's --retry restarts from byte 0 on a mid-transfer drop (and
          # -C - fixes its resume offset once at process start), so we loop FRESH curl -C -
          # invocations — each resumes from the partial file's size via a Range request. https
          # only, no redirects, IP pinned to the runner-validated address.
          ok=""
          for attempt in $(seq 1 12); do
            if curl -C - --connect-timeout 30 --proto '=https' --max-redirs 0 \
                 --resolve "${SRC_HOST}:443:${SRC_IP}" -fL -o /root/planet.pmtiles "$SRC_URL"; then ok=1; break; fi
            echo "download attempt ${attempt} interrupted; resuming in 15s…" >&2
            sleep 15
          done
          if [ -z "$ok" ]; then echo "download failed after 12 resume attempts" >&2; exit 1; fi
          # Integrity (truncation): size must equal the source content-length.
          got=$(stat -c %s /root/planet.pmtiles)
          if [ "$got" != "$SRC_LEN" ]; then echo "size mismatch: got=$got want=$SRC_LEN" >&2; exit 1; fi
          # Intra-region multipart upload (automatic per-part retry).
          aws s3 cp /root/planet.pmtiles "${BUCKET}/planet.pmtiles" \
            --acl public-read --content-type application/octet-stream --endpoint-url "$ENDPOINT"
          unset AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY
          echo "droplet pmtiles upload complete"
          REMOTE
          } | $SSH 'bash -s'

      # Runs when pmtiles OR assets were (re)uploaded — so asset-only refreshes purge too.
      - name: Purge CDN for refreshed objects
        if: ${{ env.SKIP_STREAM != 'true' || env.UPLOAD_ASSETS == 'true' }}
        run: |
          set -euo pipefail
          # grep may legitimately find no CDN — keep it from killing the step under pipefail.
          CDN_ID=$(doctl compute cdn list --format ID,Origin --no-header | { grep 'fountainrank-basemap' || true; } | awk '{print $1}' | head -1)
          if [ -z "$CDN_ID" ]; then echo "::warning::basemap CDN not found; skipping purge"; exit 0; fi
          # doctl cdn flush --files takes ABSOLUTE object paths (leading slash); no --files = flush all.
          # Retry briefly; the marker is written only AFTER this succeeds, so a hard failure fails
          # the run and the next run retries (no stale CDN left behind a stale marker).
          for attempt in 1 2 3; do
            if [ "${UPLOAD_ASSETS}" = "true" ]; then
              doctl compute cdn flush "$CDN_ID" && break # assets (+maybe pmtiles) → flush entire cache
            else
              doctl compute cdn flush "$CDN_ID" --files /planet.pmtiles && break
            fi
            if [ "$attempt" = 3 ]; then echo "::error::CDN flush failed after retries"; exit 1; fi
            echo "flush attempt $attempt failed; retrying…"; sleep 10
          done
          echo "CDN purged."

      # Marker = bare content-length (matches the resolve/skip read). Written ONLY after a
      # successful upload AND CDN purge → a failed purge leaves it stale and the next run retries.
      - name: Record change marker
        if: ${{ env.SKIP_STREAM != 'true' }}
        run: |
          set -euo pipefail
          printf '%s' "$SRC_LEN" | aws s3 cp - "${BUCKET}/planet.pmtiles.meta" \
            --acl private --content-type "text/plain" --endpoint-url "$ENDPOINT"
          echo "marker recorded (content-length=${SRC_LEN})."

      - name: Source unchanged — transfer skipped
        if: ${{ env.SKIP_STREAM == 'true' }}
        run: echo "Basemap already current (source content-length unchanged since last upload); skipping the ~127 GB transfer. Use the 'force' input to override."

      - name: Destroy worker droplet + key
        if: ${{ always() }}
        run: |
          if [ -n "${DROPLET_ID:-}" ]; then doctl compute droplet delete "$DROPLET_ID" --force || true; fi
          if [ -n "${SSH_KEY_ID:-}" ]; then doctl compute ssh-key delete "$SSH_KEY_ID" --force || true; fi

      - name: Smoke test — origin + CDN
        run: |
          set -o pipefail
          echo "Origin HEAD (Spaces)…"
          aws s3api head-object --bucket fountainrank-basemap --key planet.pmtiles \
            --endpoint-url "$ENDPOINT" --query 'ContentLength' --output text
          echo "CDN range probe (expecting HTTP 206 + Accept-Ranges)…"
          HEADERS=$(curl -s -o /dev/null -D - -H 'Origin: https://fountainrank.com' -H 'Range: bytes=0-99' "https://${CDN_HOST}/planet.pmtiles")
          printf '%s\n' "$HEADERS" | grep -iE '^HTTP/|^accept-ranges:|^content-range:|^content-length:|^access-control-allow-origin:'
          if printf '%s' "$HEADERS" | grep -q "^HTTP/.*206"; then
            echo "Smoke test PASSED — CDN serving PMTiles range requests."
          else
            echo "::error::Smoke test FAILED — expected HTTP 206 from the CDN."
            exit 1
          fi
