name: OSM Import (PBF)

# Operator-triggered large-scale OSM drinking-water import from a Geofabrik `.osm.pbf` extract
# (spec: docs/specs/2026-06-21-osm-pbf-large-scale-import-design.md,
# plan: docs/plans/2026-06-30-osm-pbf-large-scale-import.md,
# runbook: docs/runbooks/osm-fountain-import.md). Downloads a Geofabrik regional extract, coarse-
# filters it with osmium, exports GeoJSON, normalizes the osmium `-u type_id` ids, derives a
# MANDATORY PostGIS-validated scope_bounds polygon from the extract `.poly`, then streams both into
# the running backend pod and runs the already-deployed importer CLI there (same pod-exec pattern as
# osm-import.yml). dry_run defaults TRUE. Use this for state/country scales; the Overpass
# osm-import.yml stays for new metros not yet covered by a PBF scope.

on:
  workflow_dispatch:
    inputs:
      geofabrik_path:
        description: "Geofabrik path, e.g. north-america/us/california (no -latest/.osm.pbf suffix)"
        required: true
      scope_id:
        description: "Canonical scope id, e.g. geofabrik:us/california (must match the registry)"
        required: true
      dataset:
        description: "Non-secret dataset id, e.g. geofabrik:us/california (NEVER a URL)"
        required: true
      label:
        description: "Human label, e.g. California"
        required: true
      dry_run:
        description: "Dry run (no writes to fountains; only staging run + candidates)"
        type: boolean
        default: true

concurrency:
  # ALL operator workflows that take ADD_FOUNTAIN_LOCK during their membership refresh share this
  # group so they never contend on the lock; queue: max lets a bulk fan-out enqueue every dispatch
  # FIFO instead of the default single-pending behavior that cancels older pending runs.
  group: db-membership-write-production
  cancel-in-progress: false
  queue: max

permissions:
  contents: read

env:
  CLUSTER_NAME: fountainrank-production-cluster
  NAMESPACE: fountainrank
  MAX_EXTRACT_MB: "6000"

jobs:
  import:
    name: OSM PBF import (operator)
    runs-on: ubuntu-latest # Class B: handles cluster credentials
    environment: production
    services:
      # Validate the derived scope_bounds against the SAME PostGIS major the merge uses, before any
      # cluster access. The postgis image enables the postgis extension in POSTGRES_DB on init.
      postgis:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7

      - name: Validate registry + geofabrik path
        env:
          GEOFABRIK_PATH: ${{ github.event.inputs.geofabrik_path }}
          SCOPE_ID: ${{ github.event.inputs.scope_id }}
          DATASET: ${{ github.event.inputs.dataset }}
        run: |
          # One-owner control (spec §4): reject unknown/retired/aggregate scopes BEFORE any download.
          # Reject newline/CR (workflow_dispatch is API-callable), then allow-list the path syntax as
          # defense-in-depth (lowercase, single slashes, no `..`, no control chars).
          case "$GEOFABRIK_PATH" in
            *$'\n'* | *$'\r'*) echo "::error::geofabrik_path must be a single line"; exit 1 ;;
          esac
          printf '%s' "$GEOFABRIK_PATH" | grep -Eq '^[a-z0-9-]+(/[a-z0-9-]+)*$' \
            || { echo "::error::geofabrik_path failed syntax check"; exit 1; }
          # Ubuntu runners are PEP-668 externally-managed, so `pip install` fails; use the distro
          # PyYAML package (regions.py only needs yaml.safe_load).
          sudo apt-get update && sudo apt-get install -y python3-yaml
          python3 backend/app/imports/regions.py \
            --registry .github/osm-import-regions.yml \
            --source pbf --key "$GEOFABRIK_PATH" --scope-id "$SCOPE_ID" --dataset "$DATASET"

      - name: Install osmium + postgresql-client
        run: |
          sudo apt-get update
          sudo apt-get install -y osmium-tool postgresql-client
          osmium --version

      - name: Preflight + download extract
        env:
          GEOFABRIK_PATH: ${{ github.event.inputs.geofabrik_path }}
        run: |
          set -euo pipefail
          WORKDIR="$RUNNER_TEMP/osm"; mkdir -p "$WORKDIR"
          echo "WORKDIR=$WORKDIR" >> "$GITHUB_ENV"
          UA="fountainrank-osm-import/1.0 (https://fountainrank.com)"
          BASE="https://download.geofabrik.de/${GEOFABRIK_PATH}"
          PBF_URL="${BASE}-latest.osm.pbf"

          # Robust download flags: bounded connect time, per-attempt ceiling (--max-time), stall
          # detection (abort if throughput stays under 1 KB/s for 120s — catches a half-open/
          # throttled connection that would otherwise hang), and retries with backoff. --max-time
          # is PER ATTEMPT and resets on each retry, so --retry-max-time bounds the WHOLE sequence
          # (the true ceiling). Matters for the many #131 downloads.
          DL=(--fail --location --connect-timeout 30 --max-time 900 --speed-limit 1024
              --speed-time 120 --retry 5 --retry-delay 15 --retry-max-time 1800
              --retry-all-errors -A "$UA")

          # Size preflight (fail-closed): abort before filling the runner.
          LEN="$(curl -sSIL --connect-timeout 30 --max-time 120 --retry 3 --retry-delay 5 \
            --retry-max-time 300 --retry-all-errors -A "$UA" "$PBF_URL" \
            | awk 'BEGIN{IGNORECASE=1} /^content-length:/{v=$2} END{gsub(/\r/,"",v); print v}')"
          [ -n "$LEN" ] || { echo "::error::no Content-Length for $PBF_URL (preflight)"; exit 1; }
          LEN_MB=$(( (LEN + 1048575) / 1048576 ))
          if [ "$LEN_MB" -gt "$MAX_EXTRACT_MB" ]; then
            echo "::error::extract ${LEN_MB}MB exceeds MAX_EXTRACT_MB=${MAX_EXTRACT_MB} (raise cap or split)"; exit 1
          fi
          NEED_MB=$(( LEN_MB * 12 + 3000 ))   # pbf + filtered + osmium index/temp + output + headroom
          FREE_MB="$(df -Pm "$WORKDIR" | awk 'NR==2{print $4}')"
          if [ "$FREE_MB" -lt "$NEED_MB" ]; then
            echo "::error::insufficient disk on $WORKDIR: need ${NEED_MB}MB, have ${FREE_MB}MB"; exit 1
          fi
          echo "preflight ok: extract=${LEN_MB}MB need=${NEED_MB}MB free=${FREE_MB}MB"

          curl -sS "${DL[@]}" "$PBF_URL" -o "$WORKDIR/in.pbf"
          curl -sS "${DL[@]}" "${PBF_URL}.md5" -o "$WORKDIR/in.pbf.md5"
          curl -sS "${DL[@]}" "${BASE}.poly" -o "$WORKDIR/region.poly"

          # md5 = transport/corruption check ONLY (same-origin HTTPS; not authenticity/trust). The
          # Geofabrik .md5 references the remote filename, so compare hashes directly.
          EXPECTED="$(awk '{print $1}' "$WORKDIR/in.pbf.md5")"
          ACTUAL="$(md5sum "$WORKDIR/in.pbf" | awk '{print $1}')"
          [ -n "$EXPECTED" ] && [ "$EXPECTED" = "$ACTUAL" ] \
            || { echo "::error::md5 mismatch (transport corruption): $EXPECTED != $ACTUAL"; exit 1; }
          echo "downloaded + md5-verified in.pbf ($LEN_MB MB)"

      - name: Coarse filter + export + normalize
        run: |
          set -euo pipefail
          # Coarse prefilter (keys/values only; the shipped parser narrows to the exact
          # potable/public set). tags-filter keeps referenced nodes/members by default so
          # ways/areas can build geometries.
          osmium tags-filter "$WORKDIR/in.pbf" -o "$WORKDIR/filtered.pbf" \
            nwr/amenity=drinking_water,fountain nwr/man_made=water_tap
          osmium export "$WORKDIR/filtered.pbf" -u type_id -f geojson -o "$WORKDIR/osmium.geojson"
          FEAT="$(python3 backend/app/imports/osmium_geojson.py \
            "$WORKDIR/osmium.geojson" "$WORKDIR/import.geojson")"
          echo "normalized features: $FEAT"
          [ "$FEAT" -gt 0 ] || { echo "::error::no drinking-water features after normalize"; exit 1; }

      - name: Derive + PostGIS-validate scope_bounds (mandatory, fail-closed)
        run: |
          set -euo pipefail
          python3 backend/app/imports/poly_to_wkt.py "$WORKDIR/region.poly" "$WORKDIR/scope.wkt"
          test -s "$WORKDIR/scope.wkt" || { echo "::error::scope.wkt not produced"; exit 1; }
          # Build the check SQL from a file (WKT can exceed shell ARG_MAX for large regions).
          python3 - "$WORKDIR/scope.wkt" > "$WORKDIR/check.sql" <<'PY'
          import sys
          wkt = open(sys.argv[1], encoding="utf-8").read().strip().replace("'", "''")
          print(
              "SELECT ST_IsValid(g::geometry) AND ST_Area(g) > 0 AND ST_Area(g) < 2.55e14 "
              "FROM (SELECT ST_GeogFromText('" + wkt + "') AS g) s;"
          )
          PY
          VAL="$(PGPASSWORD=postgres psql -h localhost -p 5432 -U postgres -d postgres \
            -tAX -v ON_ERROR_STOP=1 -f "$WORKDIR/check.sql" | tr -d '[:space:]')"
          [ "$VAL" = "t" ] \
            || { echo "::error::scope_bounds failed PostGIS validation (result=$VAL)"; exit 1; }
          echo "scope_bounds validated in PostGIS"

      - name: Determine source_build_id (extract data timestamp)
        run: |
          set -euo pipefail
          # From the ORIGINAL downloaded extract (not filtered.pbf). Geofabrik sets the replication
          # timestamp header; try the generic header timestamp first, then the osmosis field.
          # NEVER `date` (meaningless for a PBF; breaks audit/ODbL provenance). Fail-closed if absent.
          TS="$(osmium fileinfo -g header.option.timestamp "$WORKDIR/in.pbf" 2>/dev/null || true)"
          if [ -z "$TS" ]; then
            TS="$(osmium fileinfo -g header.option.osmosis_replication_timestamp \
              "$WORKDIR/in.pbf" 2>/dev/null || true)"
          fi
          [ -n "$TS" ] || { echo "::error::could not read extract timestamp for source_build_id"; exit 1; }
          case "$TS" in *://*) echo "::error::build id looks like a URL"; exit 1 ;; esac
          echo "BUILD_ID=$TS" >> "$GITHUB_ENV"
          echo "source_build_id: $TS"

      - uses: digitalocean/action-doctl@v2.5.2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save kubeconfig
        run: doctl kubernetes cluster kubeconfig save "$CLUSTER_NAME"

      - name: Build loader inputs
        id: loader
        env:
          SCOPE_ID: ${{ github.event.inputs.scope_id }}
          DATASET: ${{ github.event.inputs.dataset }}
          LABEL: ${{ github.event.inputs.label }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail
          # WORKDIR + BUILD_ID exported earlier via GITHUB_ENV. json.dumps makes LABEL (free text)
          # exactly one argv element even with quotes/backslashes/newlines, and emits single-line
          # JSON safe for $GITHUB_OUTPUT.
          python3 - >> "$GITHUB_OUTPUT" <<'PY'
          import json
          import os

          argv = ["python", "-m", "app.imports.cli", "--path", "/work/osm-import.geojson",
                  "--scope-id", os.environ["SCOPE_ID"], "--dataset", os.environ["DATASET"],
                  "--build-id", os.environ["BUILD_ID"], "--label", os.environ["LABEL"],
                  "--scope-bounds-wkt-file", "/work/osm-scope.wkt", "--require-scope-bounds"]
          if os.environ["DRY_RUN"] == "true":
              argv.append("--dry-run")
          wd = os.environ["WORKDIR"]
          files = [{"local": wd + "/import.geojson", "container": "/work/osm-import.geojson"},
                   {"local": wd + "/scope.wkt", "container": "/work/osm-scope.wkt"}]
          print("argv_json=" + json.dumps(argv))
          print("files_json=" + json.dumps(files))
          PY

      - name: Run PBF importer (isolated Job)
        uses: ./.github/actions/run-loader-job
        with:
          job_name: osm-pbf-import
          namespace: ${{ env.NAMESPACE }}
          active_deadline_seconds: "21600"
          ready_timeout_seconds: "1800"
          argv_json: ${{ steps.loader.outputs.argv_json }}
          files_json: ${{ steps.loader.outputs.files_json }}

      - name: Delete loader Job (guaranteed teardown)
        if: always()
        run: kubectl -n "$NAMESPACE" delete job osm-pbf-import --ignore-not-found --wait --timeout=60s
