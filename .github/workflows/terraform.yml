name: Terraform

on:
  pull_request:
    branches: [main]
    paths: ["infra/terraform/**"]
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: plan
        type: choice
        options: [plan, apply]
      manage_photos_spaces:
        description: "Enable the Phase 4 private photos Spaces bucket (needs a bucket-create-capable Spaces key)"
        required: false
        default: false
        type: boolean
      target:
        description: "Optional -target for a SCOPED plan/apply (e.g. digitalocean_database_cluster.postgres). Empty = full plan/apply. Use to isolate one resource away from unrelated drift (a count-gated destroy, a k8s version bump)."
        required: false
        default: ""
        type: string

concurrency:
  group: terraform-production
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    working-directory: infra/terraform

jobs:
  # Class A: read-only, no secrets, no backend. Runs on infra PRs.
  validate:
    if: github.event_name == 'pull_request'
    runs-on: redducklabs-runners
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.6
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate

  # Class B: state-mutating, manual dispatch only.
  apply:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_KEY }}
      TF_VAR_do_token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      TF_VAR_spaces_access_id: ${{ secrets.SPACES_ACCESS_KEY }}
      TF_VAR_spaces_secret_key: ${{ secrets.SPACES_SECRET_KEY }}
      # Phase 4 photos gate (default false). Set the workflow input true — with a
      # bucket-create-capable Spaces key above — to create the private photos bucket.
      TF_VAR_manage_photos_spaces: ${{ github.event.inputs.manage_photos_spaces }}
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.6
      - run: terraform init
      - name: Terraform plan
        # The optional scoped -target comes from an untrusted dispatch input, so pass it as a raw env
        # value (Actions-evaluated, never inline in the command), VALIDATE it against the terraform
        # resource-address grammar, and build argv as an array — no word-splitting / flag injection.
        # The saved tfplan encodes -target, so the apply step replays exactly this scope.
        env:
          TARGET: ${{ github.event.inputs.target }}
        run: |
          set -euo pipefail
          args=()
          if [ -n "$TARGET" ]; then
            [[ "$TARGET" =~ ^[a-zA-Z_][a-zA-Z0-9_.\"\[\]-]*$ ]] || { echo "invalid -target: $TARGET"; exit 1; }
            args+=(-target="$TARGET")
          fi
          terraform plan -input=false "${args[@]}" -out=tfplan
      - name: Terraform apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -input=false -auto-approve tfplan
